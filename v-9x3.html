  THERAPEUTINNEN-APP  (admin.html)
  ================================
  Eine einzige, vollständig selbstenthaltene Datei. Getrennt von der Patienten-App (index.html).

  Zweck: Vorlagen (Templates) verwalten und per Link teilen. Diese Datei enthält KEINE
  Patientendaten, keinen PIN-/Vault-Mechanismus und keinen PDF-Export. Sie liegt unter einem
  eigenen, nicht von der Patienten-App verlinkten Pfad.

  Harte Regeln bleiben: null externe Aufrufe, eine Datei, kein Tracking/Konto/Cloud.

  Gemeinsame Logik mit index.html (Template-Datenmodell, Kodier-/Dekodier-Funktion für
  Teilen-Links, i18n) ist hier IDENTISCH dupliziert, damit die erzeugten Links exakt zur

// Passwort im Klartext. Die eigentliche Absicherung ist der nicht-öffentliche, nicht verlinkte
// Ablageort dieser Datei. Hier bewusst kein WebCrypto/Hashing, weil es die Scheinsicherheit
// nicht erhöhen würde. Vor Echtbetrieb ändern.

/* =========================================================================
   1. localStorage-Helfer
   ========================================================================= */
const LS = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} }
};

/* =========================================================================
   2. Base64 / Teilen-Link Kodierung   [IDENTISCH in index.html und admin.html]
   ========================================================================= */
function bytesToB64(bytes){
  let s=""; const CH=0x8000;
  for(let i=0;i<bytes.length;i+=CH){ s+=String.fromCharCode.apply(null, bytes.subarray(i,i+CH)); }
  return btoa(s);
}
function b64ToBytes(b64){
  const s=atob(b64); const out=new Uint8Array(s.length);
  for(let i=0;i<s.length;i++) out[i]=s.charCodeAt(i);
  return out;
}
function b64url(b64){ return b64.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function unb64url(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4) s+="="; return s; }
function encodeObjToHash(obj){ return b64url(bytesToB64(new TextEncoder().encode(JSON.stringify(obj)))); }
function decodeHashToObj(s){ return JSON.parse(new TextDecoder().decode(b64ToBytes(unb64url(s)))); }

/* =========================================================================

function loc(de, en){ if(LANG==="en"){ return (en&&en.trim())? en : (de||""); } return de||""; }

function optLabel(o){ return loc(o.de, o.en); }

const FIELD_TYPES=["shorttext","longtext","scale","single","multi","yesno","number","datetime"];

function F(type, label, labelEn, extra){ return Object.assign({ id:uid("f"), type, label, labelEn:labelEn||"", required:false, options:[], min:0,max:10,minLabel:"",minLabelEn:"",maxLabel:"",maxLabelEn:"" }, extra||{}); }

/* =========================================================================
   6. Datenzugriff (Templates im Klartext; keine Patientendaten hier)
   ========================================================================= */
function loadTemplates(){
  const raw=LS.get(LS_KEYS.templates);
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  const presets=defaultPresets(); LS.set(LS_KEYS.templates, JSON.stringify(presets)); return presets;
}
function saveTemplates(tpls){ LS.set(LS_KEYS.templates, JSON.stringify(tpls)); }

const APP = { unlocked:false, templates:[], screen:"gate", editingTpl:null, shareId:null };

/* =========================================================================
   7. DOM-Helfer
   ========================================================================= */
function h(tag, props, ...kids){
  const e=document.createElement(tag);
  if(props){
    for(const k in props){
      const v=props[k];
      if(v==null||v===false) continue;
      if(k==="class") e.className=v;
      else if(k==="text") e.textContent=v;
      else if(k==="html") e.innerHTML=v;
      else if(k.slice(0,2)==="on" && typeof v==="function") e.addEventListener(k.slice(2), v);
      else if(k==="value") e.value=v;
      else if(k==="checked") e.checked=!!v;
      else e.setAttribute(k, v);
    }
  }
  for(const kid of kids.flat()){
    if(kid==null||kid===false) continue;
    e.appendChild(typeof kid==="string"? document.createTextNode(kid) : kid);
  }
  return e;
}
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }
function toast(text){
  const old=document.querySelector(".toast"); if(old) old.remove();
  const el=h("div",{class:"toast",role:"status",text});
  document.body.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 2600);
}

/* =========================================================================
   8. Kopf / Sprache
   ========================================================================= */
function leafSvg(){
  const NS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("class","leaf"); svg.setAttribute("viewBox","0 0 24 24"); svg.setAttribute("aria-hidden","true");
  const p=document.createElementNS(NS,"path");
  p.setAttribute("d","M12 21c-4-1-7-4-7-9 0-4 3-8 9-9 0 6-2 9-6 11 4 0 8-3 10-8 0 8-3 14-6 15z");
  p.setAttribute("fill","var(--sage)");
  svg.appendChild(p); return svg;
}
function topbar(showLang){
  const bar=h("div",{class:"topbar"},
    h("div",{class:"brand"}, leafSvg(), h("span",{text:t("adminTitle")}))
  );
  if(showLang!==false){
    const tg=h("div",{class:"langtoggle",role:"group","aria-label":t("langLabel")},
      h("button",{class:LANG==="de"?"on":"", onclick:()=>setLang("de"), "aria-pressed":LANG==="de"}, "DE"),
      h("button",{class:LANG==="en"?"on":"", onclick:()=>setLang("en"), "aria-pressed":LANG==="en"}, "EN")
    );
    bar.appendChild(tg);
  }
  return bar;
}

/* =========================================================================
   9. Screens
   ========================================================================= */
const app = ()=>document.getElementById("app");
function mount(...nodes){ const a=app(); clear(a); const s=h("div",{class:"screen"}, ...nodes); a.appendChild(s); window.scrollTo(0,0); }

// --- Passwort-Türschloss ---
function screenGate(){
  let pw="";
  const errEl=h("p",{class:"small",style:"color:var(--danger)"});
  const input=h("input",{type:"password", autocomplete:"current-password", "aria-label":t("adminPwLabel"),
    oninput:e=>pw=e.target.value, onkeydown:e=>{ if(e.key==="Enter") submit(); }});
  const submit=()=>{
    if(pw===ADMIN_PASSWORT){ APP.unlocked=true; APP.templates=loadTemplates(); APP.screen="library"; render(); }
    else { errEl.textContent=t("adminPwWrong"); }
  };
  mount(
    topbar(),
    h("div",{class:"card stack"},
      h("h1",{text:t("adminTitle")}),
      h("p",{class:"muted",text:t("adminSub")}),
      h("div",{}, h("label",{text:t("adminPwLabel")}), input),
      errEl,
      h("button",{class:"btn block", onclick:submit}, t("adminUnlock"))
    )
  );
}

// --- Bibliothek ---
function screenLibrary(){
  const nodes=[ topbar(), h("h1",{text:t("tplLibrary")}), h("p",{class:"muted",text:t("tplLibrarySub")}) ];
  nodes.push(h("button",{class:"btn block", onclick:()=>openTplEditor(null)}, "＋ "+t("newFromScratch")));

  const list=h("div",{class:"stack"});
  for(const tpl of APP.templates){
    list.appendChild(h("div",{class:"card"},
      h("div",{class:"spread"},
        h("div",{class:"grow"},
          h("div",{style:"font-weight:700",text:tplName(tpl)}),
          h("div",{class:"small muted",text:tpl.fields.length+" "+t("fieldsWord")+(tpl.reminder&&tpl.reminder.enabled?" · ⏰ "+tpl.reminder.time:"")})
        )
      ),
      h("div",{class:"row",style:"margin-top:10px"},
        h("button",{class:"btn ghost small", onclick:()=>openTplEditor(tpl.id)}, t("edit")),
        h("button",{class:"btn ghost small", onclick:()=>duplicateTpl(tpl.id)}, t("duplicate")),
        h("button",{class:"btn ghost small", onclick:()=>renameTpl(tpl.id)}, t("rename")),
        h("button",{class:"btn ghost small", onclick:()=>{ APP.shareId=tpl.id; APP.screen="share"; render(); }}, t("shareTpl")),
        h("button",{class:"btn danger small", onclick:()=>deleteTpl(tpl.id)}, t("delete"))
      )
    ));
  }
  nodes.push(list);
  nodes.push(h("hr",{class:"divider"}));
  nodes.push(h("button",{class:"btn ghost", onclick:()=>{ APP.unlocked=false; APP.screen="gate"; render(); }}, t("adminLock")));
  mount(...nodes);
}
function findTpl(id){ return APP.templates.find(x=>x.id===id); }
function duplicateTpl(id){
  const tpl=findTpl(id); if(!tpl) return;
  const copy=JSON.parse(JSON.stringify(tpl));
  copy.id=uid("tpl");
  copy.name=(tpl.name||"Vorlage")+(LANG==="en"?" (copy)":" (Kopie)");
  copy.fields.forEach(f=>f.id=uid("f"));
  APP.templates.push(copy); saveTemplates(APP.templates); render();
}
function renameTpl(id){
  const tpl=findTpl(id); if(!tpl) return;
  const nn=window.prompt(t("renamePrompt"), tpl.name||"");
  if(nn && nn.trim()){ tpl.name=nn.trim(); saveTemplates(APP.templates); render(); }
}
function deleteTpl(id){
  if(!window.confirm(t("confirmDeleteTpl"))) return;
  APP.templates=APP.templates.filter(x=>x.id!==id); saveTemplates(APP.templates); render();
}

// --- Editor ---
function openTplEditor(id){
  if(id){ APP.editingTpl=JSON.parse(JSON.stringify(findTpl(id))); }
  else { APP.editingTpl={ id:uid("tpl"), name:"", nameEn:"", reminder:{enabled:false,time:"20:00",freq:"DAILY",patientCanOverride:true}, fields:[] }; }
  APP.screen="editor"; render();
}
function screenEditor(){
  const tpl=APP.editingTpl;
  const errEl=h("p",{class:"small",style:"color:var(--danger)"});
  const nameIn=h("input",{type:"text", value:tpl.name||"", oninput:e=>tpl.name=e.target.value});
  const nameEnIn=h("input",{type:"text", value:tpl.nameEn||"", oninput:e=>tpl.nameEn=e.target.value});

  if(!tpl.reminder) tpl.reminder={enabled:false,time:"20:00",freq:"DAILY",patientCanOverride:true};
  const remEnable=h("input",{type:"checkbox", checked:tpl.reminder.enabled, onchange:e=>{ tpl.reminder.enabled=e.target.checked; render(); }});
  const remBlock=h("div",{class:"stack"});
  if(tpl.reminder.enabled){
    const freqSel=h("select",{onchange:e=>tpl.reminder.freq=e.target.value},
      ...["DAILY","WEEKLY","NONE"].map(fq=>h("option",{value:fq, selected:tpl.reminder.freq===fq}, t("freq"+fq))));
    remBlock.append(
      h("div",{class:"grid2"},
        h("div",{}, h("label",{text:t("reminderTime")}), h("input",{type:"time", value:tpl.reminder.time||"20:00", onchange:e=>tpl.reminder.time=e.target.value})),
        h("div",{}, h("label",{text:t("reminderFreq")}), freqSel)
      ),
      h("label",{class:"choice"},
        h("input",{type:"checkbox", checked:tpl.reminder.patientCanOverride!==false, onchange:e=>tpl.reminder.patientCanOverride=e.target.checked}),
        h("span",{text:t("patientCanOverride")})
      )
    );
  }

  const fieldsWrap=h("div",{class:"stack"});
  if(tpl.fields.length===0) fieldsWrap.appendChild(h("p",{class:"muted",text:t("noFields")}));
  tpl.fields.forEach((f,idx)=>fieldsWrap.appendChild(fieldEditor(f, idx, tpl)));

  const save=()=>{
    if(!tpl.name||!tpl.name.trim()){ errEl.textContent=t("tplNameRequired"); return; }
    const existing=findTpl(tpl.id);
    if(existing){ Object.assign(existing, tpl); }
    else APP.templates.push(tpl);
    saveTemplates(APP.templates);
    APP.editingTpl=null; APP.screen="library"; render();
  };

  mount(
    topbar(),
    h("h1",{text:t("editTplTitle")}),
    h("div",{class:"card stack"},
      h("div",{}, h("label",{text:t("tplName")}), nameIn),
      h("div",{}, h("label",{text:t("tplNameEn")}), nameEnIn)
    ),
    h("div",{class:"card stack"},
      h("h3",{style:"margin-top:0",text:t("reminderConfig")}),
      h("label",{class:"choice"}, remEnable, h("span",{text:t("reminderEnable")})),
      remBlock
    ),
    h("div",{class:"card stack"},
      h("div",{class:"spread"}, h("h3",{style:"margin:0",text:t("fields")}),
        h("button",{class:"btn small", onclick:()=>{ tpl.fields.push(F("shorttext","","")); render(); }}, "＋ "+t("addField"))),
      fieldsWrap
    ),
    errEl,
    h("div",{class:"row"},
      h("button",{class:"btn ghost", onclick:()=>{ APP.editingTpl=null; APP.screen="library"; render(); }}, t("cancel")),
      h("button",{class:"btn grow", onclick:save}, t("save"))
    )
  );
}
function fieldEditor(f, idx, tpl){
  const typeSel=h("select",{onchange:e=>{ f.type=e.target.value; if((f.type==="single"||f.type==="multi")&&(!f.options||!f.options.length)) f.options=[opt("",""),opt("","")]; render(); }},
    ...FIELD_TYPES.map(ty=>h("option",{value:ty, selected:f.type===ty}, t("t_"+ty))));

  const kids=[
    h("div",{class:"spread"},
      h("span",{class:"pill",text:"#"+(idx+1)}),
      h("div",{class:"row"},
        h("button",{class:"btn ghost small", disabled:idx===0, "aria-label":t("moveUp"), onclick:()=>{ const a=tpl.fields; [a[idx-1],a[idx]]=[a[idx],a[idx-1]]; render(); }},"↑"),
        h("button",{class:"btn ghost small", disabled:idx===tpl.fields.length-1, "aria-label":t("moveDown"), onclick:()=>{ const a=tpl.fields; [a[idx+1],a[idx]]=[a[idx],a[idx+1]]; render(); }},"↓"),
        h("button",{class:"btn danger small","aria-label":t("removeField"), onclick:()=>{ tpl.fields.splice(idx,1); render(); }}, "✕")
      )
    ),
    h("div",{}, h("label",{text:t("fType")}), typeSel),
    h("div",{}, h("label",{text:t("fLabel")}), h("input",{type:"text", value:f.label||"", oninput:e=>f.label=e.target.value})),
    h("div",{}, h("label",{text:t("fLabelEn")}), h("input",{type:"text", value:f.labelEn||"", oninput:e=>f.labelEn=e.target.value})),
    h("label",{class:"choice"}, h("input",{type:"checkbox", checked:!!f.required, onchange:e=>f.required=e.target.checked}), h("span",{text:t("fRequired")}))
  ];

  if(f.type==="scale"){
    kids.push(h("div",{class:"grid2"},
      h("div",{}, h("label",{text:t("scaleMin")}), h("input",{type:"number", value:f.min!=null?f.min:0, oninput:e=>f.min=Number(e.target.value)})),
      h("div",{}, h("label",{text:t("scaleMax")}), h("input",{type:"number", value:f.max!=null?f.max:10, oninput:e=>f.max=Number(e.target.value)}))
    ));
    kids.push(h("div",{class:"grid2"},
      h("div",{}, h("label",{text:t("scaleMinLabel")}), h("input",{type:"text", value:f.minLabel||"", oninput:e=>f.minLabel=e.target.value})),
      h("div",{}, h("label",{text:t("scaleMaxLabel")}), h("input",{type:"text", value:f.maxLabel||"", oninput:e=>f.maxLabel=e.target.value}))
    ));
    kids.push(h("div",{class:"grid2"},
      h("div",{}, h("label",{class:"small",text:t("scaleMinLabel")+" (EN)"}), h("input",{type:"text", value:f.minLabelEn||"", oninput:e=>f.minLabelEn=e.target.value})),
      h("div",{}, h("label",{class:"small",text:t("scaleMaxLabel")+" (EN)"}), h("input",{type:"text", value:f.maxLabelEn||"", oninput:e=>f.maxLabelEn=e.target.value}))
    ));
  }
  if(f.type==="single"||f.type==="multi"){
    if(!Array.isArray(f.options)) f.options=[];
    const optWrap=h("div",{class:"stack"});
    f.options.forEach((o,oi)=>{
      optWrap.appendChild(h("div",{class:"grid2", style:"align-items:end"},
        h("div",{}, h("label",{class:"small",text:t("fOptDe")}), h("input",{type:"text", value:o.de||"", oninput:e=>o.de=e.target.value})),
        h("div",{class:"row",style:"align-items:end"},
          h("div",{class:"grow"}, h("label",{class:"small",text:t("fOptEn")}), h("input",{type:"text", value:o.en||"", oninput:e=>o.en=e.target.value})),
          h("button",{class:"btn danger small", onclick:()=>{ f.options.splice(oi,1); render(); }}, "✕")
        )
      ));
    });
    kids.push(h("div",{}, h("label",{text:t("fOptions")}), optWrap,
      h("button",{class:"btn ghost small",style:"margin-top:8px", onclick:()=>{ f.options.push(opt("","")); render(); }}, "＋ "+t("addOption"))));
  }

  return h("div",{class:"fielded stack"}, ...kids);
}

// --- Teilen (Link) ---
function screenShare(){
  const tpl=findTpl(APP.shareId);
  if(!tpl){ APP.screen="library"; render(); return; }
  const link=PROTOKOLL_APP_URL+"#tpl="+encodeObjToHash(tpl);
  const ta=h("textarea",{readonly:true, style:"min-height:130px; font-family:monospace; font-size:.85rem"}, link);
  const copy=async ()=>{
    try{ await navigator.clipboard.writeText(link); toast(t("copied")); }
    catch(e){ ta.focus(); ta.select(); toast(t("copyFail")); }
  };
  mount(
    topbar(),
    h("h1",{text:t("shareTitle")}),
    h("div",{class:"card stack"},
      h("div",{class:"spread"}, h("span",{style:"font-weight:700",text:tplName(tpl)}), h("span",{class:"pill",text:link.length+" chars"})),
      h("p",{class:"muted",text:t("shareBody")}),
      ta,
      h("button",{class:"btn block", onclick:copy}, t("copyLink"))
    ),
    h("button",{class:"btn ghost", onclick:()=>{ APP.shareId=null; APP.screen="library"; render(); }}, "‹ "+t("back"))
  );
}

/* =========================================================================
   10. Router + Start
   ========================================================================= */
function render(){
  document.documentElement.lang=LANG;
  if(!APP.unlocked){ return screenGate(); }
  switch(APP.screen){
    case "library": return screenLibrary();
    case "editor": return screenEditor();
    case "share": return screenShare();
    default: return screenLibrary();
  }
}
function boot(){
  // Kein WebCrypto nötig (keine Patientendaten), daher kein Secure-Context-Zwang.
  APP.screen="gate"; render();
}
boot();
</script>
