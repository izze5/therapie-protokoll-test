function bytesToB64(bytes){

function b64url(b64){ return b64.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function unb64url(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4) s+="="; return s; }

const WINANSI_HIGH = { 0x20AC:0x80,0x201A:0x82,0x0192:0x83,0x201E:0x84,0x2026:0x85,0x2020:0x86,

function toWinAnsi(str){
  const out=[];
  for(const ch of str){
    const cp=ch.codePointAt(0);
    if(cp<=0x7F){ out.push(cp); }
    else if(cp>=0xA0 && cp<=0xFF){ out.push(cp); }
    else if(WINANSI_HIGH[cp]!==undefined){ out.push(WINANSI_HIGH[cp]); }
    else { out.push(0x3F); } // '?'
  }
  return new Uint8Array(out);
}

/* =========================================================================
   3. Krypto für lokalen Speicher (WebCrypto, PBKDF2 + AES-GCM)
   ========================================================================= */
async function deriveKey(pin, saltBytes, iterations){
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pin), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt:saltBytes, iterations, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]
  );
}
async function encryptJSON(key, obj){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = new TextEncoder().encode(JSON.stringify(obj));
  const ct = new Uint8Array(await crypto.subtle.encrypt({ name:"AES-GCM", iv }, key, data));
  const out = new Uint8Array(12+ct.length); out.set(iv,0); out.set(ct,12);
  return bytesToB64(out);
}
async function decryptJSON(key, b64){
  const raw = b64ToBytes(b64);
  const iv = raw.subarray(0,12); const ct = raw.subarray(12);
  const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

/* =========================================================================

function md5(input){

  b[total-4]=bitsHi&255; b[total-3]=(bitsHi>>>8)&255; b[total-2]=(bitsHi>>>16)&255; b[total-1]=(bitsHi>>>24)&255;
  const S=[7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,
           4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];
  const K=new Uint32Array(64);
  for(let i=0;i<64;i++) K[i]=(Math.floor(Math.abs(Math.sin(i+1))*4294967296))>>>0;
  let a0=0x67452301,b0=0xefcdab89,c0=0x98badcfe,d0=0x10325476;
  const M=new Int32Array(16);
  for(let off=0;off<total;off+=64){
    for(let i=0;i<16;i++){ const j=off+i*4; M[i]=b[j]|(b[j+1]<<8)|(b[j+2]<<16)|(b[j+3]<<24); }
    let A=a0,B=b0,C=c0,D=d0;
    for(let i=0;i<64;i++){
      let F,g;
      if(i<16){ F=(B&C)|(~B&D); g=i; }
      else if(i<32){ F=(D&B)|(~D&C); g=(5*i+1)&15; }
      else if(i<48){ F=B^C^D; g=(3*i+5)&15; }
      else { F=C^(B|~D); g=(7*i)&15; }
      F=(F+A+K[i]+M[g])|0; A=D; D=C; C=B;
      B=(B+((F<<S[i])|(F>>>(32-S[i]))))|0;
    }
    a0=(a0+A)|0; b0=(b0+B)|0; c0=(c0+C)|0; d0=(d0+D)|0;
  }
  const out=new Uint8Array(16); const w=[a0,b0,c0,d0];
  for(let i=0;i<4;i++){ out[i*4]=w[i]&255; out[i*4+1]=(w[i]>>>8)&255; out[i*4+2]=(w[i]>>>16)&255; out[i*4+3]=(w[i]>>>24)&255; }
  return out;
}
function rc4(key, data){
  const s=new Uint8Array(256); for(let i=0;i<256;i++) s[i]=i;
  let j=0; for(let i=0;i<256;i++){ j=(j+s[i]+key[i%key.length])&255; const t=s[i]; s[i]=s[j]; s[j]=t; }
  const out=new Uint8Array(data.length); let a=0,b=0;
  for(let k=0;k<data.length;k++){ a=(a+1)&255; b=(b+s[a])&255; const t=s[a]; s[a]=s[b]; s[b]=t; out[k]=data[k]^s[(s[a]+s[b])&255]; }
  return out;
}

function textWidth(str, size){
  const bytes=toWinAnsi(str); let u=0;
  for(let i=0;i<bytes.length;i++) u+=HELV_W[bytes[i]];

function wrapText(str, size, maxW){
  const lines=[];
  const paragraphs=String(str).split(/\r?\n/);
  for(const para of paragraphs){
    if(para===""){ lines.push(""); continue; }
    const words=para.split(/\s+/); let cur="";
    for(let word of words){
      while(textWidth(word,size)>maxW){
        let cut=word.length;
        while(cut>1 && textWidth(word.slice(0,cut),size)>maxW) cut--;
        const head=word.slice(0,cut);
        if(cur){ lines.push(cur); cur=""; }
        lines.push(head); word=word.slice(cut);
      }
      const trial = cur? cur+" "+word : word;
      if(textWidth(trial,size)>maxW && cur){ lines.push(cur); cur=word; }
      else cur=trial;
    }
    lines.push(cur);
  }
  return lines;
}

// blocks: [{text, size, gap, indent}] oder {rule:true} -> passwortgeschütztes PDF (Uint8Array)
function buildPdf(blocks, meta, userPassword){

    const lh=size*1.35;
    const wrapped = blk.rule ? [" RULE"] : wrapText(blk.text!=null?blk.text:"", size, contentW-indent);
    for(const ln of wrapped){
      if(y-lh<MBOT) pushPage();
      cur.push({x:MX+indent, y:y-size, size, text:ln});
      y-=lh;
    }
    y-=gap;

  const userPad=padPw(toWinAnsi(userPassword||""));
  const ownerPad=userPad;

  const oKey=md5(ownerPad).subarray(0,5);

  const keyInput=new Uint8Array(32+32+4+idBytes.length);

  keyInput[64]=P_PERM&255; keyInput[65]=(P_PERM>>>8)&255; keyInput[66]=(P_PERM>>>16)&255; keyInput[67]=(P_PERM>>>24)&255;

    b[encKey.length+3]=0; b[encKey.length+4]=0;
    return md5(b).subarray(0, Math.min(encKey.length+5,16)); };
  const encStr=(num, bytes)=>rc4(objKey(num), bytes);
  const hex=(bytes)=>{ let s=""; for(let i=0;i<bytes.length;i++) s+=bytes[i].toString(16).padStart(2,"0"); return s; };

  const chunks=[]; let len=0;
  const offsets=new Array(N+1).fill(0);
  const pushBytes=(bytes)=>{ chunks.push(bytes); len+=bytes.length; };
  const pushStr=(s)=>pushBytes(new Uint8Array([...s].map(c=>c.charCodeAt(0)&255)));
  const startObj=(num)=>{ offsets[num]=len; pushStr(num+" 0 obj\n"); };
  const endObj=()=>pushStr("endobj\n");

  pushStr("%PDF-1.4\n%âãÏÓ\n");
  startObj(OBJ.catalog); pushStr("<< /Type /Catalog /Pages "+OBJ.pages+" 0 R >>\n"); endObj();
  let kids=""; for(let i=0;i<P;i++) kids+=pageObj(i)+" 0 R ";
  startObj(OBJ.pages); pushStr("<< /Type /Pages /Kids ["+kids+"] /Count "+P+" >>\n"); endObj();
  startObj(OBJ.font); pushStr("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>\n"); endObj();
  for(let i=0;i<P;i++){
    startObj(pageObj(i));
    pushStr("<< /Type /Page /Parent "+OBJ.pages+" 0 R /MediaBox [0 0 "+PW.toFixed(2)+" "+PH.toFixed(2)+"] "+
            "/Resources << /Font << /F1 "+OBJ.font+" 0 R >> >> /Contents "+contObj(i)+" 0 R >>\n");
    endObj();
  }
  for(let i=0;i<P;i++){
    let cs="BT\n"; let lastSize=null;
    for(const it of pages[i]){
      if(it.text===" RULE"){
        cs+="ET\n0.835 0.867 0.820 RG 1 w "+MX.toFixed(2)+" "+(it.y+it.size*0.5).toFixed(2)+" m "+
            (PW-MX).toFixed(2)+" "+(it.y+it.size*0.5).toFixed(2)+" l S\nBT\n";
        continue;
      }
      if(it.size!==lastSize){ cs+="/F1 "+it.size+" Tf\n"; lastSize=it.size; }
      cs+="1 0 0 1 "+it.x.toFixed(2)+" "+it.y.toFixed(2)+" Tm ("+pdfEscape(bytesToLatinStr(toWinAnsi(it.text)))+") Tj\n";
    }
    cs+="ET";
    // cs enthält nur ASCII-Operatoren + bereits WinAnsi-kodierte Textbytes (je 1 Zeichen = 1 Byte)
    const enc=encStr(contObj(i), latinStrToBytes(cs));
    startObj(contObj(i));
    pushStr("<< /Length "+enc.length+" >>\nstream\n");
    pushBytes(enc); pushStr("\nendstream\n"); endObj();
  }
  {
    const title=encStr(OBJ.info, toWinAnsi(meta.title||"Protokoll"));
    const prod=encStr(OBJ.info, toWinAnsi("Therapie-Protokoll-App"));
    startObj(OBJ.info);
    pushStr("<< /Title <"+hex(title)+"> /Producer <"+hex(prod)+"> /Creator <"+hex(prod)+"> >>\n");
    endObj();
  }
  startObj(OBJ.encrypt);
  pushStr("<< /Filter /Standard /V 1 /R 2 /O <"+hex(O)+"> /U <"+hex(U)+"> /P "+P_PERM+" >>\n");
  endObj();

  const xrefStart=len;
  pushStr("xref\n0 "+(N+1)+"\n");
  pushStr("0000000000 65535 f \n");
  for(let i=1;i<=N;i++) pushStr(String(offsets[i]).padStart(10,"0")+" 00000 n \n");
  const idHex=hex(idBytes);
  pushStr("trailer\n<< /Size "+(N+1)+" /Root "+OBJ.catalog+" 0 R /Info "+OBJ.info+" 0 R "+
          "/Encrypt "+OBJ.encrypt+" 0 R /ID [<"+idHex+"> <"+idHex+">] >>\n");
  pushStr("startxref\n"+xrefStart+"\n%%EOF\n");

  const out=new Uint8Array(len); let p=0;
  for(const c of chunks){ out.set(c,p); p+=c.length; }
  return out;
}

  return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone===true;

  return /iP(hone|od|ad)/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);

   10. DOM-Helfer (sicher: Text via textContent)
   ========================================================================= */
function h(tag, props, ...kids){
  const e=document.createElement(tag);
  if(props){
    for(const k in props){
      const v=props[k];
      if(v==null||v===false) continue;
      if(k==="class") e.className=v;
      else if(k==="text") e.textContent=v;
      else if(k==="html") e.innerHTML=v;
      else if(k.slice(0,2)==="on" && typeof v==="function") e.addEventListener(k.slice(2), v);
      else if(k==="value") e.value=v;
      else if(k==="checked") e.checked=!!v;
      else e.setAttribute(k, v);
    }
  }
  for(const kid of kids.flat()){
    if(kid==null||kid===false) continue;
    e.appendChild(typeof kid==="string"? document.createTextNode(kid) : kid);
  }
  return e;
}
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }
function toast(text){
  const old=document.querySelector(".toast"); if(old) old.remove();
  const el=h("div",{class:"toast",role:"status",text});
  document.body.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 2600);
}
function fmtDateTime(iso){
  const d=new Date(iso); if(isNaN(d)) return iso||"";
  return d.toLocaleString(LANG==="en"?"en-GB":"de-DE",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}
function fmtDate(iso){ const d=new Date(iso); if(isNaN(d)) return iso||""; return d.toLocaleDateString(LANG==="en"?"en-GB":"de-DE",{year:"numeric",month:"2-digit",day:"2-digit"}); }
function localDatetimeValue(d){
  const p=(n)=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes());
}

/* =========================================================================
   11. Kopf / Sprache-Umschalter
   ========================================================================= */
function leafSvg(){
  const NS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("class","leaf"); svg.setAttribute("viewBox","0 0 24 24"); svg.setAttribute("aria-hidden","true");
  const p=document.createElementNS(NS,"path");
  p.setAttribute("d","M12 21c-4-1-7-4-7-9 0-4 3-8 9-9 0 6-2 9-6 11 4 0 8-3 10-8 0 8-3 14-6 15z");
  p.setAttribute("fill","var(--sage)");
  svg.appendChild(p); return svg;
}
function topbar(showLang){

      h("button",{class:LANG==="de"?"on":"", onclick:()=>setLang("de"), "aria-pressed":LANG==="de"}, "DE"),
      h("button",{class:LANG==="en"?"on":"", onclick:()=>setLang("en"), "aria-pressed":LANG==="en"}, "EN")
    );
    bar.appendChild(tg);
  }
  return bar;
}

/* --- Onboarding (4 Schritte). Home-Bildschirm ist der vorgelagerte Gate-Screen;
   der Datenverlust-/PIN-Hinweis steht direkt beim PIN-Schritt (nicht mehr doppelt). --- */
function stepsBar(step, total){
  const b=h("div",{class:"steps","aria-hidden":"true"});
  for(let i=0;i<total;i++) b.appendChild(h("span",{class:i<=step?"on":""}));
  return b;
}
function screenOnboarding(){
  const step=APP.onboardStep, total=4;
  const cont=h("div",{class:"stack"});
  const navBack=()=>h("button",{class:"btn ghost", onclick:()=>{ APP.onboardStep--; render(); }},"‹ "+t("back"));
  const goto=(n)=>()=>{ APP.onboardStep=n; render(); };

  if(step===0){
    cont.append(
      h("h1",{text:t("ob1Title")}),
      h("p",{text:t("ob1Body")}),
      h("button",{class:"btn block", onclick:goto(1)}, t("next"))
    );
  } else if(step===1){
    cont.append(
      h("h1",{text:t("ob2Title")}),
      h("p",{text:t("ob2Body")}),
      h("div",{class:"notice warn stack"},
        h("p",{style:"margin:0",text:NOTFALL.notruf}),

      ),
      h("div",{class:"row",style:"margin-top:8px"}, navBack(), h("button",{class:"btn grow", onclick:goto(2)}, t("next")))
    );
  } else if(step===2){
    cont.append(
      h("h1",{text:t("obIntroTitle")}),
      h("div",{class:"notice"}, h("p",{style:"margin:0",text:t("obIntroBody")})),
      h("div",{class:"row",style:"margin-top:8px"}, navBack(), h("button",{class:"btn grow", onclick:goto(3)}, t("next")))
    );
  } else {
    let pin="", pin2="";
    const errEl=h("p",{class:"small",style:"color:var(--danger)"});
    const p1=h("input",{type:"password", inputmode:"numeric", autocomplete:"new-password", "aria-label":t("pinLabel"), oninput:e=>pin=e.target.value});
    const p2=h("input",{type:"password", inputmode:"numeric", autocomplete:"new-password", "aria-label":t("pinRepeat"), oninput:e=>pin2=e.target.value});
    const submit=async ()=>{
      if(pin.length<4){ errEl.textContent=t("pinTooShort"); return; }
      if(pin!==pin2){ errEl.textContent=t("pinMismatch"); return; }
      errEl.textContent="";
      await createVaultWithPin(pin);
    };
    cont.append(
      h("h1",{text:t("ob5Title")}),
      h("p",{class:"muted",text:t("ob5Body")}),
      h("div",{class:"notice warn"}, h("p",{style:"margin:0",text:t("ob5Warn")})),
      h("div",{class:"stack"},
        h("div",{}, h("label",{text:t("pinLabel")}), p1),
        h("div",{}, h("label",{text:t("pinRepeat")}), p2),
        errEl
      ),
      h("div",{class:"row", style:"margin-top:8px"}, navBack(), h("button",{class:"btn grow", onclick:submit}, t("startProtocol")))
    );
  }
  mount(topbar(), stepsBar(step,total), h("div",{class:"card"}, cont));
}

async function createVaultWithPin(pin){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  APP.key=await deriveKey(pin, salt, KDF_ITERATIONS);
  APP.vault=emptyVault();
  await saveVault();
  saveMeta({ hasVault:true, salt:bytesToB64(salt), iterations:KDF_ITERATIONS, created:new Date().toISOString() });
  APP.screen = APP.pendingImport? "import" : "patient";
  render();
}

function screenUnlock(){
  const meta=loadMeta();
  let pin="";
  const errEl=h("p",{class:"small",style:"color:var(--danger)"});
  const input=h("input",{type:"password", inputmode:"numeric", autocomplete:"current-password", "aria-label":t("pinLabel"),
    oninput:e=>pin=e.target.value, onkeydown:e=>{ if(e.key==="Enter") submit(); }});
  const submit=async ()=>{
    errEl.textContent="";
    try{
      const salt=b64ToBytes(meta.salt);
      const key=await deriveKey(pin, salt, meta.iterations||KDF_ITERATIONS);
      const vault=await decryptJSON(key, LS.get(LS_KEYS.vault));
      APP.key=key; APP.vault=vault;
      APP.screen = APP.pendingImport? "import":"patient";
      render();
    }catch(e){ errEl.textContent=t("unlockWrong"); }
  };
  mount(
    topbar(),
    h("div",{class:"card stack"},
      h("h1",{text:t("unlockTitle")}),
      h("p",{class:"muted",text:t("unlockBody")}),
      input, errEl,
      h("button",{class:"btn block", onclick:submit}, t("unlock"))
    )
  );
}

function entrySummary(en){
  const parts=[];
  for(const f of en.templateSnapshot.fields){
    if(f.type==="datetime") continue;
    const val=en.values[f.id];
    if(val==null||val==="") continue;
    let s="";
    if(f.type==="yesno") s=(val? t("yesLabel"):t("noLabel"));
    else if(f.type==="multi") s=Array.isArray(val)? val.map(i=>optLabel(f.options[i])).join(", "):"";
    else if(f.type==="single") s=(f.options[val]? optLabel(f.options[val]):"");
    else s=String(val);
    if(s) parts.push(fieldLabel(f)+": "+s);
    if(parts.length>=2) break;
  }
  return parts.join(" · ");
}

/* --- Eintrag anlegen / bearbeiten (Change 2) --- */
function openEntryForm(entryId, fromDraft){
  APP.editingEntryId=entryId||null;
  APP.__fromDraft=!!fromDraft;
  APP.screen="entryForm"; render();
}
function screenEntryForm(){
  const tpl=activeTemplate();
  if(!tpl){ APP.screen="patient"; render(); return; }
  let editing=null;
  if(APP.editingEntryId) editing=APP.vault.entries.find(e=>e.id===APP.editingEntryId);

  let values={}; let createdAt=new Date().toISOString();
  if(editing){ values=JSON.parse(JSON.stringify(editing.values)); createdAt=editing.createdAt; }
  else if(APP.__fromDraft && APP.vault.draft && APP.vault.draft.templateId===tpl.id){
    values=JSON.parse(JSON.stringify(APP.vault.draft.values||{})); createdAt=APP.vault.draft.createdAt||createdAt;
  }

  const errEl=h("p",{class:"small",style:"color:var(--danger)"});
  const form=h("div",{class:"stack"});

  form.appendChild(h("div",{class:"fielded"},
    h("label",{text:t("entryTime")}),
    h("input",{type:"datetime-local", value:localDatetimeValue(new Date(createdAt)),
      onchange:e=>{ const d=new Date(e.target.value); if(!isNaN(d)) createdAt=d.toISOString(); }})
  ));

  for(const f of tpl.fields){
    if(f.type==="datetime"){
      const cur=values[f.id]||localDatetimeValue(new Date(createdAt));
      form.appendChild(fieldWrap(f,
        h("input",{type:"datetime-local", value:cur, onchange:e=>values[f.id]=e.target.value})
      ));
      values[f.id]=values[f.id]||cur;
      continue;
    }
    form.appendChild(renderField(f, values));
  }

  const saveEntry=async ()=>{
    errEl.textContent="";
    for(const f of tpl.fields){
      if(!f.required) continue;
      const val=values[f.id];
      const empty = val==null || val==="" || (Array.isArray(val)&&val.length===0);
      if(empty){ errEl.textContent=t("fillRequired"); return; }
    }
    const snapshot={ id:tpl.id, name:tpl.name, nameEn:tpl.nameEn, fields:JSON.parse(JSON.stringify(tpl.fields)) };
    if(editing){
      editing.values=values; editing.createdAt=createdAt; editing.templateSnapshot=snapshot;
    } else {
      APP.vault.entries.push({ id:uid("e"), createdAt, templateSnapshot:snapshot, values });
    }
    APP.vault.draft=null;
    await saveVault();
    APP.editingEntryId=null; APP.__fromDraft=false;
    toast(t("entrySaved")); APP.screen="patient"; render();
  };
  const saveDraftAndLeave=async ()=>{
    if(!editing){ APP.vault.draft={ templateId:tpl.id, values, createdAt }; await saveVault(); }
    APP.editingEntryId=null; APP.__fromDraft=false; APP.screen="patient"; render();
  };

  mount(
    topbar(),
    h("div",{class:"spread"},
      h("h1",{style:"margin:0",text:editing? t("edit"):t("newEntry")}),
      h("span",{class:"pill",text:tplName(tpl)})
    ),
    h("div",{class:"card"}, form, errEl),
    h("div",{class:"row"},
      h("button",{class:"btn ghost", onclick:saveDraftAndLeave}, "‹ "+t("back")),
      h("button",{class:"btn grow", onclick:saveEntry}, t("saveEntry"))
    )
  );
}
function fieldWrap(f, control){
  return h("div",{class:"fielded"},
    h("label",{}, fieldLabel(f), f.required? h("span",{class:"small",style:"color:var(--danger); font-weight:600"}," · "+t("required")):null),
    control
  );
}
function renderField(f, values){
  const type=f.type;
  if(type==="shorttext"){
    return fieldWrap(f, h("input",{type:"text", value:values[f.id]||"", oninput:e=>values[f.id]=e.target.value}));
  }
  if(type==="longtext"){
    return fieldWrap(f, h("textarea",{oninput:e=>values[f.id]=e.target.value}, values[f.id]||""));
  }
  if(type==="number"){
    return fieldWrap(f, h("input",{type:"number", inputmode:"decimal", value:(values[f.id]!=null?values[f.id]:""), oninput:e=>values[f.id]=e.target.value}));
  }
  if(type==="scale"){
    const min=Number(f.min)||0, max=Number(f.max)||10;
    if(values[f.id]==null) values[f.id]=Math.round((min+max)/2);
    const out=h("span",{class:"scaleval",text:String(values[f.id])});
    const range=h("input",{type:"range", min, max, step:1, value:values[f.id], "aria-label":fieldLabel(f),
      oninput:e=>{ values[f.id]=Number(e.target.value); out.textContent=e.target.value; }});
    const ends=h("div",{class:"spread small muted"},
      h("span",{text:(loc(f.minLabel,f.minLabelEn)? min+" "+loc(f.minLabel,f.minLabelEn):String(min))}),
      h("span",{text:(loc(f.maxLabel,f.maxLabelEn)? max+" "+loc(f.maxLabel,f.maxLabelEn):String(max))})
    );
    return fieldWrap(f, h("div",{class:"stack"}, h("div",{class:"spread"}, range, out), ends));
  }
  if(type==="yesno"){
    const wrap=h("div",{class:"row"});
    const mk=(val,label)=>h("button",{class:"choice"+(values[f.id]===val?" selected":""), style:"flex:1", onclick:()=>{ values[f.id]=val; refresh(); }}, label);
    function refresh(){ clear(wrap); wrap.append(mk(true,t("yesLabel")), mk(false,t("noLabel"))); }
    refresh();
    return fieldWrap(f, wrap);
  }
  if(type==="single"){
    const wrap=h("div",{class:"stack"});
    f.options.forEach((o,i)=>{
      const id=uid("r");
      wrap.appendChild(h("label",{class:"choice"+(values[f.id]===i?" selected":""), for:id},
        h("input",{type:"radio", id, name:f.id, checked:values[f.id]===i, onchange:()=>{ values[f.id]=i; render(); }}),
        h("span",{text:optLabel(o)})
      ));
    });
    return fieldWrap(f, wrap);
  }
  if(type==="multi"){
    if(!Array.isArray(values[f.id])) values[f.id]=[];
    const wrap=h("div",{class:"stack"});
    f.options.forEach((o,i)=>{
      const id=uid("c");
      const checked=values[f.id].includes(i);
      wrap.appendChild(h("label",{class:"choice"+(checked?" selected":""), for:id},
        h("input",{type:"checkbox", id, checked, onchange:e=>{
          const arr=values[f.id];
          if(e.target.checked){ if(!arr.includes(i)) arr.push(i); } else { values[f.id]=arr.filter(x=>x!==i); }
          render();
        }}),
        h("span",{text:optLabel(o)})
      ));
    });
    return fieldWrap(f, wrap);
  }
  return fieldWrap(f, h("input",{type:"text", value:values[f.id]||"", oninput:e=>values[f.id]=e.target.value}));
}

      h("button",{class:"btn danger", onclick:resetAll}, t("dangerZone"))
    ),
    h("hr",{class:"divider"}),
    h("button",{class:"btn ghost", onclick:()=>{ APP.screen="patient"; render(); }}, "‹ "+t("back"))
  );
}
function resetAll(){
  if(!window.confirm(t("resetConfirm"))) return;
  LS.del(LS_KEYS.vault); LS.del(LS_KEYS.meta); LS.del(LS_KEYS.templates);
  APP.key=null; APP.vault=null; APP.templates=[];
  toast(t("resetDone")); APP.onboardStep=0; APP.screen="onboarding"; render();
}

/* --- PDF-Export --- */
function entriesInRange(entries, fromISO, toISO){
  return entries.filter(e=>{
    const ts=new Date(e.createdAt).getTime();
    if(fromISO && ts<new Date(fromISO).getTime()) return false;
    if(toISO && ts>new Date(toISO).getTime()+86399000) return false;
    return true;
  }).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
}
function screenExport(){
  const s=APP.vault.settings;
  const entries=APP.vault.entries;
  const problems=[];
  if(!s.patientName||!s.patientName.trim()) problems.push(t("exportNoName"));
  if(!s.pdfPassword) problems.push(t("exportNoPw"));
  if(entries.length===0) problems.push(t("exportNoEntries"));

  const nodes=[ topbar(), h("h1",{text:t("exportTitle")}) ];

  if(problems.length){
    const box=h("div",{class:"notice warn stack"});
    problems.forEach(p=>box.appendChild(h("p",{style:"margin:0",text:p})));
    nodes.push(box);
    nodes.push(h("div",{class:"row"},
      h("button",{class:"btn ghost", onclick:()=>{ APP.screen="patient"; render(); }}, "‹ "+t("back")),
      (!s.patientName||!s.pdfPassword)? h("button",{class:"btn", onclick:()=>{ APP.screen="settings"; render(); }}, t("settings")):null
    ));
    mount(...nodes); return;
  }

  const dates=entries.map(e=>new Date(e.createdAt));
  const minD=new Date(Math.min(...dates)), maxD=new Date(Math.max(...dates));
  let fromV=fmtInputDate(minD), toV=fmtInputDate(maxD);
  const fromIn=h("input",{type:"date", value:fromV, onchange:e=>fromV=e.target.value});
  const toIn=h("input",{type:"date", value:toV, onchange:e=>toV=e.target.value});
  const statusEl=h("p",{class:"small muted"});

  const doExport=async ()=>{
    const sel=entriesInRange(entries, fromV, toV);
    if(sel.length===0){ statusEl.textContent=t("exportNoEntries"); return; }
    statusEl.textContent="…";
    const bytes=generateProtocolPdf(sel, s.patientName, fromV, toV);
    const blob=new Blob([bytes], {type:"application/pdf"});
    const fname="Protokoll_"+sanitizeFilename(s.patientName)+"_"+fmtInputDate(new Date())+".pdf";
    statusEl.textContent=t("exportReady");
    let shared=false;
    try{
      if(navigator.canShare){
        const file=new File([blob], fname, {type:"application/pdf"});
        if(navigator.canShare({files:[file]})){ await navigator.share({files:[file], title:fname}); shared=true; }
      }
    }catch(e){}
    if(!shared) downloadBlob(blob, fname);
  };

  nodes.push(
    h("div",{class:"card stack"},
      h("p",{class:"muted",text:t("exportRange")}),
      h("div",{class:"grid2"},
        h("div",{}, h("label",{text:t("from")}), fromIn),
        h("div",{}, h("label",{text:t("to")}), toIn)
      ),
      h("p",{class:"small muted",style:"margin:0",text:t("exportShare")}),
      h("button",{class:"btn block", onclick:doExport}, t("exportGenerate")),
      statusEl
    ),
    h("button",{class:"btn ghost", onclick:()=>{ APP.screen="patient"; render(); }}, "‹ "+t("back"))
  );
  mount(...nodes);
}
function fmtInputDate(d){ const p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
function sanitizeFilename(s){ return (s||"protokoll").replace(/[^\p{L}\p{N}_-]+/gu,"_").slice(0,40); }
function downloadBlob(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=h("a",{href:url, download:filename}); document.body.appendChild(a); a.click();
  setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); }, 1500);
}
function generateProtocolPdf(entries, patientName, fromV, toV){
  const blocks=[];
  const range=t("from")+" "+fmtDate(fromV)+" "+t("to")+" "+fmtDate(toV);
  blocks.push({text:patientName, size:20, gap:2});
  blocks.push({text:(LANG==="en"?"Therapy log":"Therapie-Protokoll")+" · "+range, size:10.5, gap:6});
  blocks.push({rule:true, size:2, gap:10});
  entries.forEach((en)=>{
    const tn = loc(en.templateSnapshot.name, en.templateSnapshot.nameEn);
    blocks.push({text:fmtDateTime(en.createdAt)+"  —  "+tn, size:12.5, gap:3});
    for(const f of en.templateSnapshot.fields){
      if(f.type==="datetime") continue;
      const sv=formatValueForPdf(f, en.values[f.id]);
      if(sv==="") continue;
      blocks.push({text:fieldLabel(f)+": "+sv, size:11, gap:2, indent:10});
    }
    blocks.push({text:"", size:6, gap:8});
  });
  return buildPdf(blocks, {title:(LANG==="en"?"Therapy log — ":"Therapie-Protokoll — ")+patientName}, APP.vault.settings.pdfPassword);
}
function formatValueForPdf(f, val){
  if(val==null||val==="") return "";
  if(f.type==="yesno") return val? t("yesLabel"):t("noLabel");
  if(f.type==="scale") return String(val)+" / "+(f.max!=null?f.max:10);
  if(f.type==="multi") return Array.isArray(val)? val.map(i=>f.options[i]?optLabel(f.options[i]):"").filter(Boolean).join(", "):"";
  if(f.type==="single") return f.options[val]? optLabel(f.options[val]):"";
  if(f.type==="datetime") return fmtDateTime(val);
  return String(val);
}

/* --- Reminder (.ics) --- */
function screenReminder(){
  const tpl=activeTemplate();
  const nodes=[ topbar(), h("h1",{text:t("reminderTitle")}) ];
  if(!tpl || !tpl.reminder || !tpl.reminder.enabled){
    nodes.push(h("div",{class:"notice"}, h("p",{style:"margin:0",text:t("reminderNone")})));
    nodes.push(h("button",{class:"btn ghost",style:"margin-top:12px", onclick:()=>{ APP.screen="patient"; render(); }}, "‹ "+t("back")));
    mount(...nodes); return;
  }
  const r=tpl.reminder;
  const canOverride = r.patientCanOverride!==false;
  const override=APP.vault.reminderOverride||(APP.vault.reminderOverride={});
  let time = (canOverride && override[tpl.id]) ? override[tpl.id] : r.time;
  const timeIn=h("input",{type:"time", value:time, disabled:!canOverride, onchange:async e=>{ time=e.target.value; if(canOverride){ override[tpl.id]=time; await saveVault(); } }});
  const freqLabel = t("freq"+(r.freq||"DAILY"));
  const download=()=>{ openIcs(buildIcs(tpl, time), "Erinnerung_"+sanitizeFilename(tpl.name)+".ics"); };
  nodes.push(
    h("div",{class:"card stack"},
      h("p",{class:"muted",text:t("reminderBody")}),
      h("div",{}, h("label",{text:t("reminderTime")}), timeIn,
        canOverride? h("p",{class:"hint",text:t("reminderOverrideHint")}):null),
      h("div",{class:"spread"}, h("span",{style:"font-weight:600",text:t("reminderFreq")}), h("span",{class:"pill",text:freqLabel})),
      h("button",{class:"btn block", onclick:download}, t("reminderDownload")),
      isIOS()? h("p",{class:"hint",style:"margin:0",text:t("reminderIosHint")}):null
    ),
    h("button",{class:"btn ghost", onclick:()=>{ APP.screen="patient"; render(); }}, "‹ "+t("back"))
  );
  mount(...nodes);
}
// Kalender-Datei ausliefern. Auf iOS als data:-URL (ohne download-Attribut), damit iOS die
// Termin-Vorschau/„Zum Kalender hinzufügen" anbietet statt nur „In Dateien sichern".
function openIcs(ics, filename){
  if(isIOS()){
    const a=h("a",{href:"data:text/calendar;charset=utf-8,"+encodeURIComponent(ics), target:"_blank", rel:"noopener"});
    document.body.appendChild(a); a.click(); setTimeout(()=>a.remove(),1500);
  } else {
    downloadBlob(new Blob([ics], {type:"text/calendar"}), filename);
  }
}
function buildIcs(tpl, time){
  const [hh,mm]=(time||"20:00").split(":").map(Number);
  const now=new Date();
  const start=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh||20,mm||0,0);
  if(start.getTime()<now.getTime()) start.setDate(start.getDate()+1);
  const end=new Date(start.getTime()+15*60000);
  const p=n=>String(n).padStart(2,"0");
  const fmt=d=>d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+"T"+p(d.getHours())+p(d.getMinutes())+"00";
  const fmtU=d=>d.getUTCFullYear()+p(d.getUTCMonth()+1)+p(d.getUTCDate())+"T"+p(d.getUTCHours())+p(d.getUTCMinutes())+p(d.getUTCSeconds())+"Z";
  const freq=tpl.reminder.freq||"DAILY";
  const rrule = freq==="NONE"? null : (freq==="WEEKLY"?"RRULE:FREQ=WEEKLY":"RRULE:FREQ=DAILY");
  const summary=(LANG==="en"?"Log reminder: ":"Erinnerung Protokoll: ")+tplName(tpl);
  const desc=(LANG==="en"?"Time to fill in your log. Open the app: ":"Zeit für deinen Protokolleintrag. App öffnen: ")+PROTOKOLL_APP_URL;
  const esc=s=>String(s).replace(/([,;\\])/g,"\\$1").replace(/\n/g,"\\n");
  const uidStr=uid("ics")+"@protokoll.local";
  let lines=[
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Therapie-Protokoll//DE","CALSCALE:GREGORIAN",
    "BEGIN:VEVENT","UID:"+uidStr,"DTSTAMP:"+fmtU(new Date()),
    "DTSTART:"+fmt(start),"DTEND:"+fmt(end)
  ];
  if(rrule) lines.push(rrule);
  lines.push("SUMMARY:"+esc(summary));
  lines.push("DESCRIPTION:"+esc(desc));
  lines.push("URL:"+PROTOKOLL_APP_URL);
  lines.push("BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+esc(summary),"TRIGGER:PT0M","END:VALARM");
  lines.push("END:VEVENT","END:VCALENDAR");
  return lines.join("\r\n");
}

/* --- Template-Import (Patient öffnet #tpl= Link; nur übernehmen, nie bearbeiten) --- */
function screenImport(){
  const imp=APP.pendingImport;
  const nodes=[ topbar(), h("h1",{text:t("importTitle")}) ];
  if(!imp || !imp.name){
    nodes.push(h("div",{class:"notice warn"}, h("p",{style:"margin:0",text:t("importBad")})));
    nodes.push(h("button",{class:"btn ghost",style:"margin-top:12px", onclick:()=>{ APP.pendingImport=null; goHomeAfterImport(); }}, t("done")));
    mount(...nodes); return;
  }
  const doImport=async (setActive)=>{
    const copy=JSON.parse(JSON.stringify(imp));
    copy.id=uid("tpl");
    (copy.fields||[]).forEach(f=>f.id=uid("f"));
    APP.templates.push(copy); saveTemplates(APP.templates);
    addImportedSig(APP.pendingImportSig); // gleichen Link nicht bei jedem Shortcut-Start erneut anbieten
    if(setActive && APP.key && APP.vault){ APP.vault.activeTemplateId=copy.id; await saveVault(); }
    APP.pendingImport=null; APP.pendingImportSig=null; toast(t("imported"));
    goHomeAfterImport();
  };
  const canSetActive = !!(APP.key && APP.vault);
  nodes.push(
    h("div",{class:"card stack"},
      h("p",{class:"muted",text:t("importBody")}),
      h("div",{class:"notice"},
        h("div",{style:"font-weight:700",text:tplName(imp)}),
        h("div",{class:"small muted",text:(imp.fields?imp.fields.length:0)+" "+t("fieldsWord")})
      ),
      canSetActive? h("button",{class:"btn block", onclick:()=>doImport(true)}, t("importSetActive")):null,
      h("button",{class:(canSetActive?"btn secondary block":"btn block"), onclick:()=>doImport(false)}, t("importDo"))
    ),
    h("button",{class:"btn ghost", onclick:()=>{ APP.pendingImport=null; goHomeAfterImport(); }}, t("cancel"))
  );
  mount(...nodes);
}
function goHomeAfterImport(){
  try{ history.replaceState(null,"",location.pathname+location.search); }catch(e){ location.hash=""; }
  const meta=loadMeta();
  if(APP.key && APP.vault){ APP.screen="patient"; }
  else if(meta && meta.hasVault){ APP.screen="unlock"; }
  else { APP.onboardStep=0; APP.screen="onboarding"; }
  render();
}

/* =========================================================================
   13. Router
   ========================================================================= */
function render(){
  document.documentElement.lang=LANG;
  switch(APP.screen){
    case "insecure": return screenInsecure();
    case "install": return screenInstall();
    case "onboarding": return screenOnboarding();
    case "unlock": return screenUnlock();
    case "patient": return screenPatient();
    case "chooseTpl": return screenChooseTpl();
    case "entryForm": return screenEntryForm();
    case "settings": return screenSettings();
    case "export": return screenExport();
    case "reminder": return screenReminder();
    case "import": return screenImport();
    default: return routeStart();
  }
}

/* =========================================================================
   14. Start
   ========================================================================= */
// Liefert {obj, sig} bei gültigem #tpl=, {bad:true, sig} bei defektem, sonst null.
function parseHashImport(){
  const m=(location.hash||"").match(/#tpl=([^&]+)/);
  if(!m) return null;
  try{ return { obj:decodeHashToObj(m[1]), sig:m[1] }; }catch(e){ return { bad:true, sig:(m&&m[1])||"" }; }
}
// Nach Gate/Import: an die passende Stelle springen.
function routeStart(){
  const meta=loadMeta();
  if(APP.pendingImport){ APP.screen="import"; }
  else if(meta && meta.hasVault){ APP.screen="unlock"; }
  else { APP.onboardStep=0; APP.screen="onboarding"; }
  render();
}
function boot(){
  APP.templates=loadTemplates();
  const secure = (typeof window.isSecureContext==="boolean"? window.isSecureContext : (location.protocol==="https:"||location.hostname==="localhost"||location.hostname==="127.0.0.1"))
                 && window.crypto && window.crypto.subtle;
  if(!secure){ APP.screen="insecure"; render(); return; }

  const imp=parseHashImport();
  if(imp && !imp.bad){
    if(importedSigs().includes(imp.sig)){
      // Dieser Vorlagen-Link wurde bereits übernommen (z.B. Home-Bildschirm-Shortcut mit #tpl=):
      // nicht erneut anbieten, Hash entfernen, normal starten.
      try{ history.replaceState(null,"",location.pathname+location.search); }catch(e){}
    } else {
      APP.pendingImport=imp.obj; APP.pendingImportSig=imp.sig;
    }
  } else if(imp && imp.bad){
    APP.pendingImport={}; APP.pendingImportSig="";
  }

  // Home-Bildschirm-Gate: nur für neue Nutzer:innen im Browser (nicht als installierte App, kein Vault).
  const meta=loadMeta();
  if(!isStandalone() && !(meta && meta.hasVault)){ APP.screen="install"; render(); return; }
  routeStart();
}
window.addEventListener("hashchange", ()=>{
  const imp=parseHashImport();
  if(imp && !imp.bad && !importedSigs().includes(imp.sig)){
    APP.pendingImport=imp.obj; APP.pendingImportSig=imp.sig; APP.screen="import"; render();
  }
});
boot();
</script>
